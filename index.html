<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pips Hunter Official</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png" type="image/png">
    
    <style>
        body { margin: 0; padding: 0; background-color: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #4CAF50; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { font-size: 18px; font-weight: 500; text-align: center; }
    </style>
    
    <script>
        // Automatic Redirect to your live site
        window.location.replace("https://sites.google.com/view/pips-hunter-forex/Daily-Forex-Signal-And-Market-Analysis");
    </script>
</head>
<body>
    <div class="spinner"></div>
    <div class="loading-text">Opening Pips Hunter...</div>
    
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').then(null, err => console.log('SW registration failed:', err)); });
        }
    </script>
</body>
</html>
